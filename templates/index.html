<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coral Health Detector</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; }
      #preview { max-width: 100%; height: auto; }
      .result { margin-top: 1rem; font-weight: bold; }
      #feedbackControls button { margin-right: 6px; }
    </style>
  </head>
  <body>
    <h1>Coral Health Detector</h1>
    <p>Upload an image of coral; the model will predict healthy vs unhealthy.</p>
    <input type="file" id="imageInput" accept="image/*" />
    <div>
      <img id="preview" src="" alt="preview" />
    </div>
    <button id="uploadBtn">Analyze</button>
    <div class="result" id="result"></div>

    <div id="feedbackControls" style="display:none; margin-top:10px;">
      <span>Correction: </span>
      <button id="correctHealthy">Mark as Healthy</button>
      <button id="correctUnhealthy">Mark as Unhealthy</button>
      <div id="feedbackMsg" style="margin-top:6px;color:green"></div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
